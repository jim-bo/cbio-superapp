# CD: test, build, and deploy to Cloud Run on every push to main.
#
# One-time GCP setup required — run scripts/setup-wif.sh first.
#
# Required GitHub Secrets:
#   WIF_PROVIDER         — WIF provider resource name (output of setup-wif.sh)
#   WIF_SERVICE_ACCOUNT  — GCP service account email (output of setup-wif.sh)
#   GCP_PROJECT          — GCP project ID

name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_REGION: us-central1
  SERVICE: cbio-revamp
  REPO: cbio
  IMAGE_NAME: cbio-revamp
  GCS_BUCKET: ${{ vars.CBIO_GCS_BUCKET || 'your-gcs-bucket' }}

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Create empty DuckDB for tests
        run: |
          mkdir -p data
          uv run python -c "import duckdb; duckdb.connect('data/cbioportal.duckdb').close()"

      - name: Run tests
        run: uv run pytest tests/unit/ -v -k "not test_parse_vep_output_basic"

  deploy:
    name: Build & Deploy
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.REPO }}
        run: |
          IMAGE="${REGISTRY}/${{ env.IMAGE_NAME }}"
          TAG="${GITHUB_SHA:0:7}"
          docker build --platform linux/amd64 \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          REGISTRY: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/${{ env.REPO }}
        run: |
          TAG="${GITHUB_SHA:0:7}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${REGISTRY}/${{ env.IMAGE_NAME }}:${TAG}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --execution-environment gen2 \
            --memory 8Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 3 \
            --port 8080 \
            --timeout 300 \
            --cpu-boost \
            --add-volume "name=duckdb-vol,type=cloud-storage,bucket=${{ env.GCS_BUCKET }},mount-options=only-dir=master" \
            --add-volume-mount "volume=duckdb-vol,mount-path=/mnt/gcs" \
            --set-env-vars "CBIO_DB_PATH=/mnt/gcs/cbioportal.duckdb" \
            --set-env-vars "CBIO_SESSIONS_DB_URL=sqlite:////tmp/sessions.db" \
            --set-env-vars "CBIO_SECURE_COOKIES=1" \
            --allow-unauthenticated \
            --project "${GCP_PROJECT}"

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)"
