{% extends "base.html" %}

{% block title %}Vanilla Dashboard — cBioPortal{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="/static/css/vanilla-dashboard.css">
<style>
    .dashboard-container {
        padding: 20px;
        background-color: #f0f0f0;
        min-height: calc(100vh - 150px);
    }
    .widget-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
        gap: 20px;
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <div class="widget-grid">
        {% include "study_view/partials/charts/vanilla_table.html" %}
    </div>
</div>
{% endblock %}
