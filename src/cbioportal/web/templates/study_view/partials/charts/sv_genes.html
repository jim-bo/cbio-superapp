<div id="chart-sv-genes"
     class="chart-card chart-card-wide"
     hx-post="/study/summary/chart/sv-genes"
     hx-target="#chart-sv-genes"
     hx-trigger="filterChanged from:body"
     hx-include="#study-id-input,#filter-json-input">
    <div class="chart-card-header">
        <span>Structural Variant Genes</span>
    </div>
    <div class="chart-card-body">
        {% if sv_genes %}
        <table class="chart-table">
            <thead>
                <tr style="background:#f5f5f5;">
                    <th style="padding:2px 4px;font-size:10px;text-align:left;">Gene</th>
                    <th style="padding:2px 4px;font-size:10px;text-align:right;">#SV</th>
                    <th style="padding:2px 4px;font-size:10px;text-align:right;">#Samples</th>
                    <th style="padding:2px 4px;font-size:10px;text-align:right;">#Profiled</th>
                    <th style="padding:2px 4px;font-size:10px;" colspan="2">Freq</th>
                </tr>
            </thead>
            <tbody>
            {% for g in sv_genes[:30] %}
            <tr style="cursor:pointer;" title="{{ g.gene }}">
                <td class="gene-name">{{ g.gene }}</td>
                <td style="text-align:right;color:#555;">{{ g.n_sv }}</td>
                <td style="text-align:right;color:#555;">{{ g.n_samples }}</td>
                <td style="text-align:right;color:#888;">{{ g.n_profiled }}</td>
                <td class="freq-bar-wrap">
                    <div class="freq-bar-bg">
                        <div class="freq-bar-fill" style="width: {{ g.freq }}%;background:#ff7043;"></div>
                    </div>
                </td>
                <td style="text-align:right;color:#999;font-size:10px;width:36px;">{{ g.freq }}%</td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div style="padding: 8px; color: #999; font-size: 11px;">No structural variant data</div>
        {% endif %}
    </div>
</div>
