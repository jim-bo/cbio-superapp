# Cloud Run Job: merge all per-study DuckDBs into the master DB.
#
# The merge job downloads per-study DBs one at a time to ephemeral disk,
# ATTACHes each, copies tables, DETACHes, then deletes the local copy.
# Peak disk usage = size of largest single per-study DB (not sum).
#
# Deploy:
#   gcloud run jobs replace .cloud/merge-job.yaml \
#     --region us-central1 \
#     --project ${GCP_PROJECT}
#
# Execute (full merge):
#   gcloud run jobs execute cbio-merge --region us-central1 --wait
#
# Execute (merge specific studies):
#   gcloud run jobs execute cbio-merge --region us-central1 --wait \
#     --update-env-vars MERGE_STUDY_IDS="acc_tcga msk_chord_2024"

apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: cbio-merge
spec:
  template:
    spec:
      template:
        spec:
          containers:
            - image: us-central1-docker.pkg.dev/${GCP_PROJECT}/cbio/cbio-revamp:latest
              command: ["cbio"]
              args:
                - beta
                - cloud
                - merge
              env:
                - name: CBIO_GCS_BUCKET
                  value: ${GCS_BUCKET}
              resources:
                limits:
                  cpu: "4"
                  memory: 16Gi
                  ephemeral-storage: 32Gi
          serviceAccountName: ${JOB_SA_EMAIL}
          timeoutSeconds: 21600   # 6 h for a full merge of all studies
          maxRetries: 0           # Not idempotent mid-run; investigate before retrying
